<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStore</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

 
  <header class="header">
    <div class="logo">
      <img src="./image/logo-removebg-preview.png" alt="logo techstore" >
      
    </div>

    <div class="cart">
      🛒 <span class="cart-count">0</span>
    </div>
  </header>

  
  <section class="hero">

  </section>


  <section class="promo-bar">
    <h2>PROMOÇÕES RELÂMPAGO</h2>
  </section>


  <main class="products-container">

    
    <article class="card">
      <img src="../ex-pratica02/image/memoria ram.png" alt="">
      <h3>Memória RAM Kingston Fury</h3>
      <p class="old-price">R$ 249,99</p>
      <p class="new-price">R$ 199,99</p>
      <button>ADICIONE AO CARRINHO</button>
    </article>

    <article class="card">
      <img src="../ex-pratica02/image/placa-de-video.png" alt="">
      <h3>Placa de Vídeo RTX</h3>
      <p class="old-price">R$ 1.899,99</p>
      <p class="new-price">R$ 1.599,99</p>
      <button>ADICIONE AO CARRINHO</button>
    </article>

    <article class="card">
      <img src="../ex-pratica02/image/Gabinete.png" alt="">
      <h3>Gabinete Gamer</h3>
      <p class="old-price">R$ 499,99</p>
      <p class="new-price">R$ 399,99</p>
      <button>ADICIONE AO CARRINHO</button>
    </article>

    <article class="card">
      <img src="../ex-pratica02/image/placa mãe.png" alt="">
      <h3>Placa Mãe ASUS</h3>
      <p class="old-price">R$ 899,99</p>
      <p class="new-price">R$ 749,99</p>
      <button>ADICIONE AO CARRINHO</button>
    </article>

    <article class="card">
      <img src="./image/fonte.png" alt="">
      <h3>Fonte 600W</h3>
      <p class="old-price">R$ 399,99</p>
      <p class="new-price">R$ 329,99</p>
      <button>ADICIONE AO CARRINHO</button>
    </article>

    <article class="card">
      <img src="./image/kit ventoinha.png" alt="">
      <h3>Kit RGB Gamer</h3>
      <p class="old-price">R$ 299,99</p>
      <p class="new-price">R$ 239,99</p>
      <button>ADICIONE AO CARRINHO</button>
    </article>

  </main>


 <footer class="footer">

  <div class="footer-left">
    <img src="./image/logo-removebg-preview.png" alt="logo techstore">
  </div>

  <div class="footer-right">
    <p>FORMAS DE PAGAMENTO</p>

    <div class="payment-icons">
      <img src="./image/Visa_Inc._logo__2005_2014_-removebg-preview.png" alt="visa">
      <img src="./image/Mastercard-logo-removebg-preview.png" alt="mastercard">
      <img src="./image/images-removebg-preview.png" alt="pix">
    </div>

  </div>

</footer>

</body>
</html>
